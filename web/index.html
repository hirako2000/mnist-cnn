<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MNIST Digit Classifier | Handwriting Recognition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.24.3/dist/ort.min.js"></script>
    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
        }

        html {
            background: #131830;
            scroll-behavior: smooth;
        }
        @keyframes draw-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .animate-draw-pulse {
            animation: draw-pulse 1.5s ease-in-out infinite;
        }
        canvas {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-linear-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen font-sans antialiased">
    <div class="">
        <div class="backdrop-blur-sm">
            <div class="bg-gradient-to-r from-indigo-600/50 via-purple-600/50 to-pink-600 px-5 py-7 md:px-8 md:py-9 text-center">
                <h1 class="text-2xl md:text-2xl font-bold text-white mb-2 tracking-tight">MNIST Digit Classifier</h1>
                <p class="text-indigo-100 text-base md:text-lg max-w-md mx-auto"> ✍️ Handwritten digit recognition</p>
            </div>
            
            <div class="p-5 md:p-8 bg-white/5 backdrop-blur-sm">
                <div class="grid md:grid-cols-2 gap-6 md:gap-8">
                    <div class="bg-white/10 rounded-xl p-5 shadow-lg transition-all hover:shadow-xl border border-neutral-400">
                        <div class="flex items-center gap-2 mb-4">
                            <h3 class="font-semibold text-neutral-200 text-lg">Draw a digit</h3>
                        </div>
                        <div class="flex justify-center mb-4">
                            <canvas id="drawingCanvas" width="280" height="280" class="border-2 border-neutral-400 rounded-lg shadow-md bg-black cursor-crosshair w-full max-w-[280px] h-auto"></canvas>
                        </div>
                        <div class="flex gap-3 justify-center">
                            <button id="predictBtn" class="bg-indigo-600 cursor-pointer hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                Predict
                            </button>
                            <button id="clearCanvas" class="bg-gray-200 cursor-pointer hover:bg-gray-300 text-gray-700 font-medium py-2.5 px-6 rounded-lg transition-all duration-200 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                Clear
                            </button>
                        </div>
                    </div>
                    
                    <div class="bg-white/10 rounded-xl p-5 shadow-lg transition-all hover:shadow-xl border border-neutral-400">
                        <div class="flex items-center gap-2 mb-4">
                            <h3 class="font-semibold text-neutral-200 text-lg">Or, Upload image</h3>
                        </div>
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-indigo-400 transition-colors">
                            <input type="file" id="imageUpload" accept="image/*" class="hidden">
                            <label for="imageUpload" class="cursor-pointer block">
                                <div id="imagePreview" class="min-h-[160px] flex flex-col items-center justify-center">
                                    <svg class="w-12 h-12 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    <span class="text-neutral-200 text-sm">Click or tap to upload<br>JPG, PNG, or WEBP</span>
                                </div>
                            </label>
                        </div>
                        <div class="mt-4 flex justify-center">
                            <button id="predictUploadBtn" class="bg-indigo-600 cursor-pointer hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg w-full disabled:opacity-50 disabled:cursor-not-allowed">
                                🔮 Predict uploaded image
                            </button>
                        </div>
                    </div>
                </div>
                
                <div id="prediction" class="mt-6 bg-gradient-to-r from-indigo-100/10 to-purple-100/10 rounded-xl p-5 hidden border border-indigo-100 scroll-mt-4">
                    <div class="text-center">
                        <div class="inline-flex items-center gap-2 rounded-full px-3 py-1 mb-3">
                            <span class="text-neutral-100 text-sm font-semibold">PREDICTION RESULT</span>
                        </div>
                        <div class="text-6xl md:text-8xl font-black text-neutral-200 bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2" id="predictedDigit">-</div>
                        <div class="max-w-md mx-auto">
                            <div class="flex justify-between text-sm text-neutral-200 mb-1">
                                <span>Confidence</span>
                                <span id="confidenceText" class="font-semibold text-neutral-200">0%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                <div id="confidenceFill" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                            </div>
                        </div>
                        <div id="probabilities" class="mt-4 text-left max-w-md mx-auto"></div>
                    </div>
                </div>
                
                <div class="mt-6 flex flex-col items-center gap-2">
                    <div id="status" class="text-white/80 text-sm bg-white/10 px-4 py-2 rounded-full backdrop-blur-sm flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        Initializing model...
                    </div>
                    <div id="backendInfo" class="text-white/50 text-xs font-mono bg-white/5 px-3 py-1 rounded-full">—</div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-6 pb-4 text-white/40 text-xs">
            <p>Powered by ONNX Runtime Web — Runs locally in your browser. No data leaves your device | <a href="https://github.com/hirako2000/mnist-cnn">Source Code</a></a></p>
        </div>
    </div>

    <script type="module">
        import { useMNISTClassifier } from './mnist-worker.js';
        
        const classifier = useMNISTClassifier();
        
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 24;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        let drawing = false;
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            
            return { x, y };
        }
        
        function startDrawing(e) {
            drawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        
        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }
        
        function smoothScrollToPrediction() {
            const predictionDiv = document.getElementById('prediction');
            if (predictionDiv && !predictionDiv.classList.contains('hidden')) {
                predictionDiv.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start',
                    inline: 'nearest'
                });
            }
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        document.getElementById('clearCanvas').addEventListener('click', () => {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'white';
            document.getElementById('prediction').classList.add('hidden');
        });
        
        async function init() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>Loading model with WebGPU...';
            
            const success = await classifier.loadModel('./model.onnx');
            
            if (success) {
                statusDiv.innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>Ready! Draw or upload a digit';
                document.getElementById('backendInfo').innerHTML = classifier.backend;
            } else {
                statusDiv.innerHTML = '<div class="w-2 h-2 bg-red-400 rounded-full"></div>Failed to load model';
            }
        }
        
        function displayPrediction(result) {
            const predictionDiv = document.getElementById('prediction');
            predictionDiv.classList.remove('hidden');
            
            document.getElementById('predictedDigit').textContent = result.digit;
            document.getElementById('confidenceFill').style.width = `${result.confidence * 100}%`;
            document.getElementById('confidenceText').textContent = `${(result.confidence * 100).toFixed(1)}%`;
            
            const probsDiv = document.getElementById('probabilities');
            probsDiv.innerHTML = '<div class="text-xs font-semibold text-neutral-200 mb-2">DISTRIBUTION</div>';
            
            for (let i = 0; i < result.probabilities.length; i++) {
                const prob = result.probabilities[i];
                const percent = (prob * 100).toFixed(1);
                const barColor = i === result.digit ? 'from-indigo-500 to-purple-500' : 'from-neutral-400 to-neutral-500';
                probsDiv.innerHTML += `
                    <div class="mb-2">
                        <div class="flex justify-between text-xs mb-0.5">
                            <span class="font-mono font-medium ${i === result.digit ? 'text-neutral-100' : 'text-neutral-200'}">Digit ${i}</span>
                            <span class="${i === result.digit ? 'text-neutral-100 font-semibold' : 'text-neutral-300'}">${percent}%</span>
                        </div>
                        <div class="w-full bg-neutral-200 rounded-full h-1.5 overflow-hidden">
                            <div class="bg-gradient-to-r ${barColor} h-1.5 rounded-full transition-all duration-300" style="width: ${prob * 100}%"></div>
                        </div>
                    </div>
                `;
            }
            
            smoothScrollToPrediction();
        }
        
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const result = await classifier.predict(canvas);
            if (result) displayPrediction(result);
        });
        
        document.getElementById('predictUploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('imageUpload');
            if (fileInput.files.length > 0) {
                const btn = document.getElementById('predictUploadBtn');
                btn.disabled = true;
                btn.innerHTML = '<div class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent mx-auto"></div>';
                
                const result = await classifier.predict(fileInput.files[0]);
                if (result) displayPrediction(result);
                
                btn.disabled = false;
                btn.innerHTML = '🔮 Predict image';
            } else {
                alert('Please select an image first');
            }
        });
        
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const previewDiv = document.getElementById('imagePreview');
                    previewDiv.innerHTML = `<img src="${event.target.result}" class="max-h-40 mx-auto rounded-lg shadow-md" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        init();
    </script>
</body>
</html>
